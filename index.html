<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotGLA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            padding: 2rem;
            background-color: #0f111a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Título */
        .titulo {
            font-size: 2.2rem;
            font-weight: bold;
            color: #a881ff;
            margin-bottom: 2rem;
        }

        /* Botões das páginas */
        .linha-paginas {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .botao-pagina {
            border: 2px solid #b088f9;
            padding: 0.5rem 1.5rem;
            min-width: 100px;
            text-align: center;
            font-size: 1.1rem;
            background-color: #1a1c2e;
            color: #c4b5fd;
            cursor: pointer;
            transition: all 0.2s;
        }

        .botao-pagina.ativo {
            background-color: #5b21b6;
            border-color: #7c3aed;
            color: white;
        }

        .botao-pagina:hover {
            background-color: #252840;
        }

        /* Nome da página atual */
        .pagina-atual {
            border: 2px solid #b088f9;
            padding: 0.5rem 2rem;
            width: fit-content;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #1a1c2e;
            color: #c4b5fd;
        }

        /* Área principal */
        .area-principal {
            border: 3px solid #888;
            padding: 1.5rem;
            background-color: #161826;
            max-width: 1050px;
            width: 100%;
        }

        /* Grade de itens */
        .grade {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 1rem;
        }

        .item {
            border: 2px solid #f8a8c8;
            background-color: #1e2033;
            padding: 1.5rem 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 140px;
        }

        .texto-imagem {
            color: #93c5fd;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        /* Caixa de marcação */
        .caixa {
            width: 24px;
            height: 24px;
            border: 2px solid #a5b4fc;
            background-color: #1e2033;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #a5b4fc;
        }

        .caixa.marcado {
            background-color: #22c55e;
            border-color: #16a34a;
            color: white;
        }
    </style>
</head>
<body>

    <h1 class="titulo">PotGLA</h1>

    <div class="linha-paginas">
        <div class="botao-pagina ativo" onclick="irParaPagina(1)">Página 1</div>
        <div class="botao-pagina" onclick="irParaPagina(2)">Página 2</div>
        <div class="botao-pagina" onclick="irParaPagina(3)">Página 3</div>
    </div>

    <div class="pagina-atual" id="nomePagina">Página 1</div>

    <div class="area-principal">
        <div class="grade" id="grade"></div>
    </div>

    <script>
        // Dados das páginas
        let dados = JSON.parse(localStorage.getItem('dadosPotGLA')) || {
            paginaAtual: 1,
            paginas: [
                { nome: "Página 1", marcacoes: Array(12).fill(false) },
                { nome: "Página 2", marcacoes: Array(12).fill(false) },
                { nome: "Página 3", marcacoes: Array(12).fill(false) }
            ]
        };

        // Renderizar a página
        function renderizar() {
            const pag = dados.paginas[dados.paginaAtual - 1];
            document.getElementById('nomePagina').textContent = pag.nome;

            // Ativar botão
            document.querySelectorAll('.botao-pagina').forEach((botao, i) => {
                botao.classList.toggle('ativo', i + 1 === dados.paginaAtual);
            });

            // Montar a grade
            const grade = document.getElementById('grade');
            grade.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <span class="texto-imagem">Imagem</span>
                    <div class="caixa ${pag.marcacoes[i] ? 'marcado' : ''}" onclick="marcar(${i})">${pag.marcacoes[i] ? '✗' : ''}</div>
                `;
                grade.appendChild(div);
            }
        }

        // Trocar de página
        function irParaPagina(num) {
            dados.paginaAtual = num;
            salvar();
            renderizar();
        }

        // Marcar / Desmarcar
        function marcar(indice) {
            const pag = dados.paginas[dados.paginaAtual - 1];
            pag.marcacoes[indice] = !pag.marcacoes[indice];
            salvar();
            renderizar();
        }

        // Salvar dados
        function salvar() {
            localStorage.setItem('dadosPotGLA', JSON.stringify(dados));
        }

        // Iniciar
        renderizar();
    </script>

</body>
</html>
