<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotGLA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            padding: 30px;
            background-color: #f9f9f9; /* Fundo claro igual ao seu desenho */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Título PotGLA */
        .titulo {
            font-size: 28px;
            font-weight: bold;
            color: #333333;
            margin-bottom: 20px;
        }

        /* Botões das páginas */
        .linha-botoes {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        .botao-pagina {
            border: 2px solid #000000;
            background-color: #ffffff;
            color: #60b8e0;
            padding: 6px 22px;
            min-width: 100px;
            text-align: center;
            font-size: 16px;
            cursor: pointer;
        }

        .botao-pagina.ativo {
            background-color: #e6f4ff;
        }

        /* Nome da página atual */
        .pagina-atual {
            border: 2px solid #000000;
            background-color: #ffffff;
            color: #60b8e0;
            padding: 6px 30px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        /* Área principal */
        .area-principal {
            border: 3px solid #888888;
            background-color: #ffffff;
            padding: 20px;
            width: 100%;
            max-width: 1150px;
        }

        /* Grade de itens */
        .grade {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
        }

        .item {
            border: 2px solid #f8a8c8;
            background-color: #ffffff;
            padding: 25px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 130px;
        }

        .texto-imagem {
            color: #60b8e0;
            font-size: 16px;
        }

        /* Caixa de marcação */
        .caixa {
            width: 24px;
            height: 24px;
            border: 2px solid #000000;
            background-color: #ffffff;
            margin-top: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
        }

        .caixa.marcado {
            background-color: #90ee90;
            color: #000000;
        }
    </style>
</head>
<body>

    <h1 class="titulo">PotGLA</h1>

    <div class="linha-botoes">
        <div class="botao-pagina ativo" onclick="trocarPagina(1)">Página 1</div>
        <div class="botao-pagina" onclick="trocarPagina(2)">Página 2</div>
        <div class="botao-pagina" onclick="trocarPagina(3)">Página 3</div>
    </div>

    <div class="pagina-atual" id="nomePagina">Página 1</div>

    <div class="area-principal">
        <div class="grade" id="gradeItens"></div>
    </div>

    <script>
        // Dados salvos
        let dados = JSON.parse(localStorage.getItem('dadosPotGLA')) || {
            paginaAtual: 1,
            paginas: [
                { nome: "Página 1", marcacoes: Array(12).fill(false) },
                { nome: "Página 2", marcacoes: Array(12).fill(false) },
                { nome: "Página 3", marcacoes: Array(12).fill(false) }
            ]
        };

        // Montar a tela
        function montarTela() {
            const pagina = dados.paginas[dados.paginaAtual - 1];
            document.getElementById('nomePagina').textContent = pagina.nome;

            // Ativar botão
            document.querySelectorAll('.botao-pagina').forEach((botao, i) => {
                botao.classList.toggle('ativo', i + 1 === dados.paginaAtual);
            });

            // Gerar os 12 itens
            const grade = document.getElementById('gradeItens');
            grade.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <span class="texto-imagem">Imagem</span>
                    <div class="caixa ${pagina.marcacoes[i] ? 'marcado' : ''}" onclick="marcarItem(${i})">${pagina.marcacoes[i] ? '✗' : ''}</div>
                `;
                grade.appendChild(div);
            }
        }

        // Trocar de página
        function trocarPagina(num) {
            dados.paginaAtual = num;
            salvarDados();
            montarTela();
        }

        // Marcar/desmarcar
        function marcarItem(indice) {
            const pagina = dados.paginas[dados.paginaAtual - 1];
            pagina.marcacoes[indice] = !pagina.marcacoes[indice];
            salvarDados();
            montarTela();
        }

        // Salvar para não perder
        function salvarDados() {
            localStorage.setItem('dadosPotGLA', JSON.stringify(dados));
        }

        // Iniciar
        montarTela();
    </script>

</body>
</html>
