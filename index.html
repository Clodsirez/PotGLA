<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PotGLA</title>
<style>
  :root{
    --bg: #0b0b16;
    --panel: #12121f;
    --panel-border: #2a2a55;
    --purple: #6c4cf5;
    --purple-light: #8b6bff;
    --card-bg: #16162a;
    --card-border: #3a3a6b;
    --text: #e6e6f0;
    --text-dim: #9a9ac0;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background: var(--bg);
    font-family: 'Segoe UI', Arial, sans-serif;
    color: var(--text);
    padding: 24px;
  }

  .logo{
    font-size: 28px;
    font-weight: 800;
    color: var(--purple-light);
    margin-bottom: 18px;
    letter-spacing: 0.5px;
  }

  .tabs{
    display:flex;
    gap:8px;
    margin-bottom: 22px;
  }

  .tab{
    padding: 10px 22px;
    border-radius: 10px;
    border: 1px solid var(--panel-border);
    background: transparent;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    transition: all .15s ease;
  }

  .tab.active{
    background: var(--purple);
    border-color: var(--purple);
    color: #fff;
    font-weight: 600;
  }

  .tab:hover:not(.active){
    border-color: var(--purple-light);
    color: var(--text);
  }

  .page-section{
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 24px;
  }

  .page-title{
    display:flex;
    justify-content:center;
    margin-bottom: 22px;
  }

  .page-title span{
    background: rgba(108,76,245,0.12);
    border: 1px solid var(--purple);
    color: var(--purple-light);
    padding: 6px 26px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 16px;
  }

  @media (max-width: 900px){
    .grid{ grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 520px){
    .grid{ grid-template-columns: repeat(2, 1fr); }
  }

  .card{
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 10px 12px;
    display:flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: border-color .15s ease;
  }

  .card:hover{ border-color: var(--purple-light); }

  .thumb{
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 8px;
    background: #1b1b33;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .thumb svg{
    width: 46%;
    height: 46%;
    opacity: 0.55;
  }

  .caption{
    font-size: 13px;
    color: var(--text-dim);
  }

  .chk{
    width: 22px;
    height: 22px;
    border-radius: 5px;
    border: 2px solid var(--card-border);
    background: transparent;
    cursor: pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: all .15s ease;
    position: relative;
  }

  .chk input{
    position:absolute;
    inset:0;
    opacity:0;
    cursor:pointer;
    margin:0;
  }

  .chk svg{
    width: 14px;
    height: 14px;
    stroke: #fff;
    fill:none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    transition: opacity .1s ease;
  }

  .chk.checked{
    background: var(--purple);
    border-color: var(--purple);
  }

  .chk.checked svg{ opacity: 1; }

  .save-indicator{
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--purple);
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity .25s ease, transform .25s ease;
    pointer-events: none;
  }

  .save-indicator.show{
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>
<body>

  <div class="logo">PotGLA</div>

  <div class="tabs">
    <button class="tab active" data-page="1">Página 1</button>
    <button class="tab" data-page="2">Página 2</button>
    <button class="tab" data-page="3">Página 3</button>
  </div>

  <div class="page-section">
    <div class="page-title"><span id="page-title">Página 1</span></div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="save-indicator" id="save-indicator">Salvo ✓</div>

<script>
  const STORAGE_KEY = 'potgla_state';

  const IMAGE_ICON = `
    <svg viewBox="0 0 24 24">
      <path d="M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6z"
        stroke="#c9c9e8" stroke-width="1.5" fill="none"/>
      <circle cx="9" cy="10" r="1.6" fill="#c9c9e8"/>
      <path d="M4 17l5-5 3 3 4-4 4 4" stroke="#c9c9e8" stroke-width="1.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

  const CHECK_ICON = `<svg viewBox="0 0 24 24"><polyline points="4 12 9 17 20 6"></polyline></svg>`;

  // Estado padrão de cada página (usado somente se não houver nada salvo no navegador ainda)
  const DEFAULT_DATA = {
    1: [false, true, false, false, true, false, true, false, true, false, false, true],
    2: [true, false, true, true, false, false, false, true, false, true, false, false],
    3: [false, false, true, false, true, true, false, false, true, false, true, false]
  };

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){
      console.warn('Não foi possível ler o localStorage:', e);
    }
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  }

  function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
      showSaved();
    }catch(e){
      console.warn('Não foi possível salvar no localStorage:', e);
    }
  }

  let saveTimeout;
  function showSaved(){
    const el = document.getElementById('save-indicator');
    el.classList.add('show');
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => el.classList.remove('show'), 1200);
  }

  const DATA = loadState();
  let currentPage = 1;

  function buildGrid(pageNum){
    currentPage = pageNum;
    const state = DATA[pageNum];
    const grid = document.getElementById('grid');
    document.getElementById('page-title').textContent = 'Página ' + pageNum;
    grid.innerHTML = '';

    state.forEach((isChecked, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="thumb">${IMAGE_ICON}</div>
        <div class="caption">Imagem</div>
        <label class="chk ${isChecked ? 'checked' : ''}">
          <input type="checkbox" ${isChecked ? 'checked' : ''} data-index="${i}">
          ${CHECK_ICON}
        </label>
      `;
      grid.appendChild(card);
    });

    grid.querySelectorAll('.chk').forEach(chk => {
      const input = chk.querySelector('input');
      input.addEventListener('change', () => {
        chk.classList.toggle('checked', input.checked);
        const idx = parseInt(input.dataset.index, 10);
        DATA[currentPage][idx] = input.checked;
        saveState();
      });
    });
  }

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      buildGrid(parseInt(tab.dataset.page, 10));
    });
  });

  buildGrid(1);
</script>

</body>
</html>
