<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PotGLA</title>
<style>
  :root{
    --bg: #0b0b16;
    --panel: #12121f;
    --panel-border: #2a2a55;
    --purple: #6c4cf5;
    --purple-light: #8b6bff;
    --card-bg: #16162a;
    --card-border: #3a3a6b;
    --text: #e6e6f0;
    --text-dim: #9a9ac0;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background: var(--bg);
    font-family: 'Segoe UI', Arial, sans-serif;
    color: var(--text);
    padding: 24px;
  }

  .logo{
    font-size: 28px;
    font-weight: 800;
    color: var(--purple-light);
    margin-bottom: 18px;
    letter-spacing: 0.5px;
    text-align: center;
  }

  .tabs{
    display:flex;
    flex-wrap: wrap;
    justify-content: center;
    gap:8px;
    margin-bottom: 8px;
  }

  .tabs:last-of-type{
    margin-bottom: 22px;
  }

  .tab{
    padding: 10px 22px;
    border-radius: 10px;
    border: 1px solid var(--panel-border);
    background: transparent;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    transition: all .15s ease;
    white-space: nowrap;
  }

  .tab.active{
    background: var(--purple);
    border-color: var(--purple);
    color: #fff;
    font-weight: 600;
  }

  .tab:hover:not(.active){
    border-color: var(--purple-light);
    color: var(--text);
  }

  .page-section{
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 24px;
  }

  .page-title{
    display:flex;
    justify-content:center;
    margin-bottom: 22px;
  }

  .page-title span{
    background: rgba(108,76,245,0.12);
    border: 1px solid var(--purple);
    color: var(--purple-light);
    padding: 6px 26px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 16px;
  }

  @media (max-width: 900px){
    .grid{ grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 520px){
    .grid{ grid-template-columns: repeat(2, 1fr); }
  }

  .card{
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 10px 12px;
    display:flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: border-color .15s ease;
  }

  .card:hover{ border-color: var(--purple-light); }

  .thumb{
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 8px;
    background: #1b1b33;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .thumb svg{
    width: 46%;
    height: 46%;
    opacity: 0.55;
  }

  .caption{
    font-size: 13px;
    color: var(--text-dim);
  }

  .chk{
    width: 22px;
    height: 22px;
    border-radius: 5px;
    border: 2px solid var(--card-border);
    background: transparent;
    cursor: pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: all .15s ease;
    position: relative;
  }

  .chk input{
    position:absolute;
    inset:0;
    opacity:0;
    cursor:pointer;
    margin:0;
  }

  .chk svg{
    width: 14px;
    height: 14px;
    stroke: #fff;
    fill:none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    transition: opacity .1s ease;
  }

  .chk.checked{
    background: var(--purple);
    border-color: var(--purple);
  }

  .chk.checked svg{ opacity: 1; }

  .save-indicator{
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--purple);
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity .25s ease, transform .25s ease;
    pointer-events: none;
  }

  .save-indicator.show{
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>
<body>

  <div class="logo">PotGLA</div>

  <!-- Linha 1: NAVEGADORES (gerados via JS a partir de CONFIG) -->
  <div class="tabs" id="tabs-navegador"></div>

  <!-- Linha 2: PÁGINAS do navegador selecionado (gerados via JS) -->
  <div class="tabs" id="tabs-pagina"></div>

  <!-- Único grid, mostra o conteúdo da combinação navegador + página -->
  <div class="page-section">
    <div class="page-title"><span id="page-title">Página 1</span></div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="save-indicator" id="save-indicator">Salvo ✓</div>

<script>
  /* =========================================================================
     CONFIGURAÇÃO
     -------------------------------------------------------------------------
     Pra adicionar mais navegadores, páginas ou imagens/marcações,
     só editar o array/objeto abaixo. Não tem limite de quantidade —
     o HTML e o layout se ajustam sozinhos (as abas quebram linha
     automaticamente se não couberem, o grid também é responsivo).

     Estrutura:
     CONFIG = [
       {
         id: 'nav1',                 // identificador único do navegador
         name: 'Navegador A',        // nome exibido na aba de cima
         pages: [
           {
             id: 'pag1',             // identificador único da página (dentro deste navegador)
             name: 'Início',         // nome exibido na aba de baixo
             marks: 6                // quantidade de imagens/marcações nesta página
           },
           ...
         ]
       },
       ...
     ]
  ========================================================================== */
  const CONFIG = [
    {
      id: 'nav2',
      name: 'Arlong Key',
      pages: [
        { id: 'pag1', name: 'Personagens',         marks: 6 }
      ]
    },
    {
      id: 'nav1',
      name: 'Baus',
      pages: [
        { id: 'pag1', name: 'Foosha Village',         marks: 6 },
        { id: 'pag2', name: 'Shells Town',   marks: 6 },
        { id: 'pag3', name: 'Samui Island',      marks: 6 },
        { id: 'pag4', name: 'Orange Town',      marks: 6 },
        { id: 'pag5', name: 'Syrup Village',      marks: 6 },
        { id: 'pag6', name: 'Island of Rare Animals',      marks: 6 },
        { id: 'pag7', name: 'Baratie',      marks: 6 },
        { id: 'pag8', name: 'Cocoyasi Village',      marks: 6 },
        { id: 'pag9', name: 'Loguetown',      marks: 6 },
        { id: 'pag10', name: 'Kumo Island',      marks: 6 },
        { id: 'pag11', name: 'East Blue (Mar)',      marks: 6 }
      ]
    },
    {
      id: 'nav2',
      name: 'Potion East Blue',
      pages: [
        { id: 'pag1', name: 'Shells Town',   marks: 6 },
        { id: 'pag2', name: 'Samui Island',      marks: 6 },
        { id: 'pag3', name: 'Syrup Village',      marks: 6 },
        { id: 'pag4', name: 'Island of Rare Animals',      marks: 6 },
        { id: 'pag5', name: 'Cocoyasi Village',      marks: 6 },
        { id: 'pag6', name: 'Loguetown',      marks: 6 },
      ]
    },
    {
      id: 'nav3',
      name: 'Potion Grand Line',
      pages: [
        { id: 'pag1', name: 'Whisky Peak',         marks: 6 },
        { id: 'pag2', name: 'Jaya',   marks: 6 },
        { id: 'pag3', name: 'Little Garden',      marks: 6 },
        { id: 'pag4', name: 'Drum Island',      marks: 6 },
        { id: 'pag5', name: 'Nige Hashiru',      marks: 6 },
        { id: 'pag6', name: 'Alabasta West',      marks: 6 },
        { id: 'pag7', name: 'Alabasta East',      marks: 6 },
        { id: 'pag8', name: 'Skypeia',      marks: 6 },
        { id: 'pag9', name: 'Water 7',      marks: 6 },
        { id: 'pag10', name: 'Enies Lobby',      marks: 6 },
        { id: 'pag11', name: 'Amazon Lily',      marks: 6 },
        { id: 'pag12', name: 'Kuragaina Island',      marks: 6 },
        { id: 'pag13', name: 'Sabaody Archipelago',      marks: 6 }
      ]
    }
    // Exemplo de como adicionar o navegador nº 20 (é só copiar este bloco):
    // {
    //   id: 'nav20',
    //   name: 'Navegador 20',
    //   pages: [
    //     { id: 'pag1', name: 'Página 1', marks: 6 },
    //     { id: 'pag2', name: 'Página 2', marks: 6 }
    //   ]
    // }
  ];

  const STORAGE_KEY = 'potgla_state_dynamic';

  const IMAGE_ICON = `
    <svg viewBox="0 0 24 24">
      <path d="M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6z"
        stroke="#c9c9e8" stroke-width="1.5" fill="none"/>
      <circle cx="9" cy="10" r="1.6" fill="#c9c9e8"/>
      <path d="M4 17l5-5 3 3 4-4 4 4" stroke="#c9c9e8" stroke-width="1.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

  const CHECK_ICON = `<svg viewBox="0 0 24 24"><polyline points="4 12 9 17 20 6"></polyline></svg>`;

  function findNavegador(navId){
    return CONFIG.find(n => n.id === navId);
  }
  function findPagina(navId, pagId){
    return findNavegador(navId).pages.find(p => p.id === pagId);
  }

  function buildDefaultData(){
    const data = {};
    CONFIG.forEach(nav => {
      data[nav.id] = {};
      nav.pages.forEach(pag => {
        // gera um padrão alternado (true/false) só pra ter algo de exemplo
        data[nav.id][pag.id] = Array.from({length: pag.marks}, (_, i) => i % 3 === 1);
      });
    });
    return data;
  }

  function loadState(){
    const fresh = buildDefaultData();
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const saved = JSON.parse(raw);
        // mescla o salvo com o padrão (caso CONFIG tenha mudado, ex: novo navegador/página)
        CONFIG.forEach(nav => {
          nav.pages.forEach(pag => {
            if(saved[nav.id] && saved[nav.id][pag.id]){
              fresh[nav.id][pag.id] = saved[nav.id][pag.id];
            }
          });
        });
      }
    }catch(e){
      console.warn('Não foi possível ler o localStorage:', e);
    }
    return fresh;
  }

  function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
      showSaved();
    }catch(e){
      console.warn('Não foi possível salvar no localStorage:', e);
    }
  }

  let saveTimeout;
  function showSaved(){
    const el = document.getElementById('save-indicator');
    el.classList.add('show');
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => el.classList.remove('show'), 1200);
  }

  const DATA = loadState();
  let currentNavId = CONFIG[0].id;
  let currentPagId = CONFIG[0].pages[0].id;

  function renderNavegadorTabs(){
    const container = document.getElementById('tabs-navegador');
    container.innerHTML = '';
    CONFIG.forEach(nav => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (nav.id === currentNavId ? ' active' : '');
      btn.textContent = nav.name;
      btn.dataset.navId = nav.id;
      btn.addEventListener('click', () => {
        currentNavId = nav.id;
        currentPagId = findNavegador(nav.id).pages[0].id;
        renderNavegadorTabs();
        renderPaginaTabs();
        renderGrid();
      });
      container.appendChild(btn);
    });
  }

  function renderPaginaTabs(){
    const container = document.getElementById('tabs-pagina');
    container.innerHTML = '';
    const nav = findNavegador(currentNavId);
    nav.pages.forEach(pag => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (pag.id === currentPagId ? ' active' : '');
      btn.textContent = pag.name;
      btn.dataset.pagId = pag.id;
      btn.addEventListener('click', () => {
        currentPagId = pag.id;
        renderPaginaTabs();
        renderGrid();
      });
      container.appendChild(btn);
    });
  }

  function renderGrid(){
    const pag = findPagina(currentNavId, currentPagId);
    const state = DATA[currentNavId][currentPagId];
    const grid = document.getElementById('grid');
    document.getElementById('page-title').textContent = pag.name;
    grid.innerHTML = '';

    state.forEach((isChecked, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="thumb">${IMAGE_ICON}</div>
        <div class="caption">Imagem</div>
        <label class="chk ${isChecked ? 'checked' : ''}">
          <input type="checkbox" ${isChecked ? 'checked' : ''} data-index="${i}">
          ${CHECK_ICON}
        </label>
      `;
      grid.appendChild(card);
    });

    grid.querySelectorAll('.chk').forEach(chk => {
      const input = chk.querySelector('input');
      input.addEventListener('change', () => {
        chk.classList.toggle('checked', input.checked);
        const idx = parseInt(input.dataset.index, 10);
        DATA[currentNavId][currentPagId][idx] = input.checked;
        saveState();
      });
    });
  }

  renderNavegadorTabs();
  renderPaginaTabs();
  renderGrid();
</script>

</body>
</html>
