<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PotGLA</title>
<style>
  :root{
    --bg: #0b0b16;
    --panel: #12121f;
    --panel-border: #2a2a55;
    --purple: #6c4cf5;
    --purple-light: #8b6bff;
    --card-bg: #16162a;
    --card-border: #3a3a6b;
    --text: #e6e6f0;
    --text-dim: #9a9ac0;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background: var(--bg);
    font-family: 'Segoe UI', Arial, sans-serif;
    color: var(--text);
    padding: 24px;
  }

  .logo{
    font-size: 28px;
    font-weight: 800;
    color: var(--purple-light);
    margin-bottom: 18px;
    letter-spacing: 0.5px;
    text-align: center;
  }

  .tabs{
    display:flex;
    flex-wrap: wrap;
    justify-content: center;
    gap:8px;
    margin-bottom: 8px;
  }

  .tabs:last-of-type{
    margin-bottom: 22px;
  }

  .tab{
    padding: 10px 22px;
    border-radius: 10px;
    border: 1px solid var(--panel-border);
    background: transparent;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    transition: all .15s ease;
    white-space: nowrap;
  }

  .tab.active{
    background: var(--purple);
    border-color: var(--purple);
    color: #fff;
    font-weight: 600;
  }

  .tab:hover:not(.active){
    border-color: var(--purple-light);
    color: var(--text);
  }

  .page-section{
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 24px;
  }

  .page-title{
    display:flex;
    justify-content:center;
    margin-bottom: 22px;
  }

  .page-title span{
    background: rgba(108,76,245,0.12);
    border: 1px solid var(--purple);
    color: var(--purple-light);
    padding: 6px 26px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 16px;
  }

  @media (max-width: 900px){
    .grid{ grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 520px){
    .grid{ grid-template-columns: repeat(2, 1fr); }
  }

  .card{
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 10px 12px;
    display:flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: border-color .15s ease;
  }

  .card:hover{ border-color: var(--purple-light); }

  .thumb{
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 8px;
    background: #1b1b33;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow: hidden;
  }

  .thumb svg{
    width: 46%;
    height: 46%;
    opacity: 0.55;
  }

  .thumb img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .caption{
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
  }

  .chk{
    width: 22px;
    height: 22px;
    border-radius: 5px;
    border: 2px solid var(--card-border);
    background: transparent;
    cursor: pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: all .15s ease;
    position: relative;
  }

  .chk input{
    position:absolute;
    inset:0;
    opacity:0;
    cursor:pointer;
    margin:0;
  }

  .chk svg{
    width: 14px;
    height: 14px;
    stroke: #fff;
    fill:none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    transition: opacity .1s ease;
  }

  .chk.checked{
    background: var(--purple);
    border-color: var(--purple);
  }

  .chk.checked svg{ opacity: 1; }

  .save-indicator{
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--purple);
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity .25s ease, transform .25s ease;
    pointer-events: none;
  }

  .save-indicator.show{
    opacity: 1;
    transform: translateY(0);
  }
</style>

  function findNavegador(navId){
    return CONFIG.find(n => n.id === navId);
  }
  function findPagina(navId, pagId){
    return findNavegador(navId).pages.find(p => p.id === pagId);
  }

  function buildDefaultData(){
    const data = {};
    CONFIG.forEach(nav => {
      data[nav.id] = {};
      nav.pages.forEach(pag => {
        data[nav.id][pag.id] = {};
        pag.items.forEach((item, i) => {
          // padrão de exemplo: marca 1 a cada 3 itens
          data[nav.id][pag.id][item.id] = (i % 3 === 1);
        });
      });
    });
    return data;
  }

  function loadState(){
    const fresh = buildDefaultData();
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const saved = JSON.parse(raw);
        CONFIG.forEach(nav => {
          nav.pages.forEach(pag => {
            pag.items.forEach(item => {
              if(saved[nav.id] && saved[nav.id][pag.id] && (item.id in saved[nav.id][pag.id])){
                fresh[nav.id][pag.id][item.id] = saved[nav.id][pag.id][item.id];
              }
            });
          });
        });
      }
    }catch(e){
      console.warn('Não foi possível ler o localStorage:', e);
    }
    return fresh;
  }

  function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
      showSaved();
    }catch(e){
      console.warn('Não foi possível salvar no localStorage:', e);
    }
  }

  let saveTimeout;

  let currentPagId = CONFIG[0].pages[0].id;

  function renderNavegadorTabs(){
    const container = document.getElementById('tabs-navegador');
    container.innerHTML = '';
    CONFIG.forEach(nav => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (nav.id === currentNavId ? ' active' : '');
      btn.textContent = nav.name;
      btn.dataset.navId = nav.id;
      btn.addEventListener('click', () => {
        currentNavId = nav.id;
        currentPagId = findNavegador(nav.id).pages[0].id;
        renderNavegadorTabs();
        renderPaginaTabs();
        renderGrid();
      });
      container.appendChild(btn);
    });
  }

  function renderPaginaTabs(){
    const container = document.getElementById('tabs-pagina');
    container.innerHTML = '';
    const nav = findNavegador(currentNavId);
    nav.pages.forEach(pag => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (pag.id === currentPagId ? ' active' : '');
      btn.textContent = pag.name;
      btn.dataset.pagId = pag.id;
      btn.addEventListener('click', () => {
        currentPagId = pag.id;
        renderPaginaTabs();
        renderGrid();
      });
      container.appendChild(btn);
    });
  }

  function renderGrid(){
    const pag = findPagina(currentNavId, currentPagId);
    const pageState = DATA[currentNavId][currentPagId];
    const grid = document.getElementById('grid');
    document.getElementById('page-title').textContent = pag.name;
    grid.innerHTML = '';

    pag.items.forEach(item => {
      const isChecked = !!pageState[item.id];
      const thumbContent = item.image
        ? `<img src="${item.image}" alt="${item.name}">`
        : IMAGE_ICON;

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="thumb">${thumbContent}</div>
        <div class="caption">${item.name}</div>
        <label class="chk ${isChecked ? 'checked' : ''}">
          <input type="checkbox" ${isChecked ? 'checked' : ''} data-item-id="${item.id}">
          ${CHECK_ICON}
        </label>
      `;
      grid.appendChild(card);
    });

    grid.querySelectorAll('.chk').forEach(chk => {
      const input = chk.querySelector('input');
      input.addEventListener('change', () => {
        chk.classList.toggle('checked', input.checked);
        const itemId = input.dataset.itemId;
        DATA[currentNavId][currentPagId][itemId] = input.checked;
        saveState();
      });
    });
  }

  renderNavegadorTabs();
  renderPaginaTabs();
  renderGrid();
</script>

</body>
</html>
