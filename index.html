<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PotGLA</title>
<style>
  :root{
    --bg: #0b0b16;
    --panel: #12121f;
    --panel-border: #2a2a55;
    --purple: #6c4cf5;
    --purple-light: #8b6bff;
    --card-bg: #16162a;
    --card-border: #3a3a6b;
    --text: #e6e6f0;
    --text-dim: #9a9ac0;
  }

  *{ box-sizing: border-box; margin: 0; padding: 0; }

  body{
    min-height:100vh;
    background: var(--bg);
    font-family: 'Segoe UI', Arial, sans-serif;
    color: var(--text);
    padding: 24px;
  }

  .logo{
    font-size: 28px;
    font-weight: 800;
    color: var(--purple-light);
    margin-bottom: 18px;
    letter-spacing: 0.5px;
    text-align: center;
  }

  .tabs{
    display:flex;
    flex-wrap: wrap;
    justify-content: center;
    gap:8px;
    margin-bottom: 8px;
  }

  .tabs:last-of-type{
    margin-bottom: 22px;
  }

  .tab{
    padding: 10px 22px;
    border-radius: 10px;
    border: 1px solid var(--panel-border);
    background: transparent;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    transition: all .15s ease;
    white-space: nowrap;
  }

  .tab.active{
    background: var(--purple);
    border-color: var(--purple);
    color: #fff;
    font-weight: 600;
  }

  .tab:hover:not(.active){
    border-color: var(--purple-light);
    color: var(--text);
  }

  .page-section{
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 24px;
  }

  .page-title{
    display:flex;
    justify-content:center;
    margin-bottom: 22px;
  }

  .page-title span{
    background: rgba(108,76,245,0.12);
    border: 1px solid var(--purple);
    color: var(--purple-light);
    padding: 6px 26px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 16px;
  }

  @media (max-width: 900px){
    .grid{ grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 520px){
    .grid{ grid-template-columns: repeat(2, 1fr); }
  }

  .card{
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 10px 12px;
    display:flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: border-color .15s ease;
  }

  .card:hover{ border-color: var(--purple-light); }

  .thumb{
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 8px;
    background: #1b1b33;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow: hidden;
  }

  .thumb svg{
    width: 46%;
    height: 46%;
    opacity: 0.55;
  }

  .thumb img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .caption{
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
  }

  .chk{
    width: 22px;
    height: 22px;
    border-radius: 5px;
    border: 2px solid var(--card-border);
    background: transparent;
    cursor: pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: all .15s ease;
    position: relative;
  }

  .chk input{
    position:absolute;
    inset:0;
    opacity:0;
    cursor:pointer;
    margin:0;
  }

  .chk svg{
    width: 14px;
    height: 14px;
    stroke: #fff;
    fill:none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    transition: opacity .1s ease;
  }

  .chk.checked{
    background: var(--purple);
    border-color: var(--purple);
  }

  .chk.checked svg{ opacity: 1; }

  .save-indicator{
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--purple);
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity .25s ease, transform .25s ease;
    pointer-events: none;
  }

  .save-indicator.show{
    opacity: 1;
    transform: translateY(0);
  }

  .card.baus-card{
    cursor: pointer;
  }

  .card.baus-card .chk{
    pointer-events: none;
  }

  .progress-label{
    font-size: 11px;
    color: var(--text-dim);
    margin-top: -4px;
  }

  .modal-overlay{
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,5,12,0.72);
    align-items: center;
    justify-content: center;
    z-index: 999;
    padding: 20px;
  }

  .modal-overlay.show{
    display: flex;
  }

  .modal-box{
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 22px;
    width: min(360px, 100%);
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .modal-header{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .modal-title{
    font-size: 15px;
    font-weight: 700;
    color: var(--purple-light);
  }

  .modal-close{
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
  }

  .modal-close:hover{
    color: var(--text);
    background: rgba(255,255,255,0.06);
  }

  .modal-chests{
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .chest-row{
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
    font-size: 14px;
  }

  .modal-footer{
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
  }
</style>
</head>

  const STORAGE_KEY = 'potgla_state_dynamic_v2';

  const IMAGE_ICON = `
    <svg viewBox="0 0 24 24">
      <path d="M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6z"

      <circle cx="9" cy="10" r="1.6" fill="#c9c9e8"/>
      <path d="M4 17l5-5 3 3 4-4 4 4" stroke="#c9c9e8" stroke-width="1.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

  const CHECK_ICON = `<svg viewBox="0 0 24 24"><polyline points="4 12 9 17 20 6"></polyline></svg>`;

  function findNavegador(navId){
    return CONFIG.find(n => n.id === navId);
  }
  function findPagina(navId, pagId){
    return findNavegador(navId).pages.find(p => p.id === pagId);
  }

  function buildDefaultData(){
    const data = {};
    CONFIG.forEach(nav => {
      data[nav.id] = {};
      nav.pages.forEach(pag => {
        data[nav.id][pag.id] = {};
        pag.items.forEach((item, i) => {
          data[nav.id][pag.id][item.id] = (i % 3 === 1);
        });
      });
    });
    return data;
  }

  function loadState(){
    const fresh = buildDefaultData();
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const saved = JSON.parse(raw);
        CONFIG.forEach(nav => {
          nav.pages.forEach(pag => {
            pag.items.forEach(item => {
              if(saved[nav.id] && saved[nav.id][pag.id] && (item.id in saved[nav.id][pag.id])){
                fresh[nav.id][pag.id][item.id] = saved[nav.id][pag.id][item.id];
              }
            });
          });
        });
      }
    }catch(e){
      console.warn('Não foi possível ler o localStorage:', e);
    }
    return fresh;
  }

  function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
      showSaved();
    }catch(e){
      console.warn('Não foi possível salvar no localStorage:', e);
    }
  }

  let saveTimeout;
  function showSaved(){
    const el = document.getElementById('save-indicator');
    el.classList.add('show');
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => el.classList.remove('show'), 1200);
  }

  const DATA = loadState();
  let currentNavId = CONFIG[0].id;
  let currentPagId = CONFIG[0].pages[0].id;

  // ---- Baús (chests): apenas a aba "Baus" usa isso ----
  const BAUS_NAV_ID = 'nav2';
  const BAUS_PER_ITEM = 5;
  const STORAGE_KEY_BAUS = 'potgla_baus_state_v1';

  function buildDefaultBaus(){
    const data = {};
    CONFIG.forEach(nav => {
      data[nav.id] = {};
      nav.pages.forEach(pag => {
        data[nav.id][pag.id] = {};
        pag.items.forEach(item => {
          data[nav.id][pag.id][item.id] = Array(BAUS_PER_ITEM).fill(false);
        });
      });
    });
    return data;
  }

  function loadBaus(){
    const fresh = buildDefaultBaus();
    try{
      const raw = localStorage.getItem(STORAGE_KEY_BAUS);
      if(raw){
        const saved = JSON.parse(raw);
        CONFIG.forEach(nav => {
          nav.pages.forEach(pag => {
            pag.items.forEach(item => {
              const savedArr = saved[nav.id] && saved[nav.id][pag.id] && saved[nav.id][pag.id][item.id];
              if(Array.isArray(savedArr)){
                fresh[nav.id][pag.id][item.id] = Array(BAUS_PER_ITEM)
                  .fill(false)
                  .map((_, i) => !!savedArr[i]);
              }
            });
          });
        });
      }
    }catch(e){
      console.warn('Não foi possível ler os baús no localStorage:', e);
    }
    return fresh;
  }

  function saveBaus(){
    try{
      localStorage.setItem(STORAGE_KEY_BAUS, JSON.stringify(DATA_BAUS));
      showSaved();
    }catch(e){
      console.warn('Não foi possível salvar os baús no localStorage:', e);
    }
  }

  const DATA_BAUS = loadBaus();

  function openBausModal(itemId){
    const pag = findPagina(currentNavId, currentPagId);
    const item = pag.items.find(i => i.id === itemId);
    const chests = DATA_BAUS[currentNavId][currentPagId][itemId];

    document.getElementById('modal-title').textContent = `${item.name} — ${pag.name}`;
    const container = document.getElementById('modal-chests');
    container.innerHTML = '';

    chests.forEach((val, idx) => {
      const row = document.createElement('label');
      row.className = 'chest-row';
      row.innerHTML = `
        <span>Baú ${idx + 1}</span>
        <div class="chk ${val ? 'checked' : ''}">
          <input type="checkbox" ${val ? 'checked' : ''} data-chest-idx="${idx}">
          ${CHECK_ICON}
        </div>
      `;
      const input = row.querySelector('input');
      const chkEl = row.querySelector('.chk');
      input.addEventListener('change', () => {
        chkEl.classList.toggle('checked', input.checked);
        DATA_BAUS[currentNavId][currentPagId][itemId][idx] = input.checked;
        const allDone = DATA_BAUS[currentNavId][currentPagId][itemId].every(Boolean);
        DATA[currentNavId][currentPagId][itemId] = allDone;
        saveBaus();
        saveState();
        renderGrid();
      });
      container.appendChild(row);
    });

    document.getElementById('modal-overlay').classList.add('show');
  }

  function closeBausModal(){
    document.getElementById('modal-overlay').classList.remove('show');
  }

  document.getElementById('modal-close').addEventListener('click', closeBausModal);
  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if(e.target.id === 'modal-overlay') closeBausModal();
  });

  function renderNavegadorTabs(){
    const container = document.getElementById('tabs-navegador');
    container.innerHTML = '';
    CONFIG.forEach(nav => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (nav.id === currentNavId ? ' active' : '');
      btn.textContent = nav.name;
      btn.dataset.navId = nav.id;
      btn.addEventListener('click', () => {
        currentNavId = nav.id;
        currentPagId = findNavegador(nav.id).pages[0].id;
        renderNavegadorTabs();
        renderPaginaTabs();
        renderGrid();
      });
      container.appendChild(btn);
    });
  }

  function renderPaginaTabs(){
    const container = document.getElementById('tabs-pagina');
    container.innerHTML = '';
    const nav = findNavegador(currentNavId);
    nav.pages.forEach(pag => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (pag.id === currentPagId ? ' active' : '');
      btn.textContent = pag.name;
      btn.dataset.pagId = pag.id;
      btn.addEventListener('click', () => {
        currentPagId = pag.id;
        renderPaginaTabs();
        renderGrid();
      });
      container.appendChild(btn);
    });
  }

  function renderGrid(){
    const pag = findPagina(currentNavId, currentPagId);
    const pageState = DATA[currentNavId][currentPagId];
    const grid = document.getElementById('grid');
    document.getElementById('page-title').textContent = pag.name;
    grid.innerHTML = '';

    const isBaus = currentNavId === BAUS_NAV_ID;

    pag.items.forEach(item => {
      const isChecked = !!pageState[item.id];
      const thumbContent = item.image
        ? `<img src="${item.image}" alt="${item.name}">`
        : IMAGE_ICON;

      const card = document.createElement('div');

      if(isBaus){
        // Aba "Baus": clicar no personagem abre o popup para marcar os 5 baús.
        // O personagem só fica marcado quando os 5 baús estiverem completos.
        const chests = DATA_BAUS[currentNavId][currentPagId][item.id] || [];
        const doneCount = chests.filter(Boolean).length;

        card.className = 'card baus-card';
        card.innerHTML = `
          <div class="thumb">${thumbContent}</div>
          <div class="caption">${item.name}</div>
          <div class="progress-label">${doneCount}/${BAUS_PER_ITEM} baús</div>
          <div class="chk ${isChecked ? 'checked' : ''}">
            ${CHECK_ICON}
          </div>
        `;
        card.addEventListener('click', () => openBausModal(item.id));
      } else {
        // Demais abas: comportamento normal, um clique marca/desmarca direto.
        card.className = 'card';
        card.innerHTML = `
          <div class="thumb">${thumbContent}</div>
          <div class="caption">${item.name}</div>
          <label class="chk ${isChecked ? 'checked' : ''}">
            <input type="checkbox" ${isChecked ? 'checked' : ''} data-item-id="${item.id}">
            ${CHECK_ICON}
          </label>
        `;
        const input = card.querySelector('input');
        const chkLabel = card.querySelector('.chk');
        input.addEventListener('change', () => {
          chkLabel.classList.toggle('checked', input.checked);
          DATA[currentNavId][currentPagId][item.id] = input.checked;
          saveState();
        });
      }

      grid.appendChild(card);
    });
  }

  renderNavegadorTabs();
  renderPaginaTabs();
  renderGrid();
