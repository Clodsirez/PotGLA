<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotGLA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            padding: 2rem;
            background-color: #f8f8f8;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Título principal */
        .titulo {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 2rem;
        }

        /* Botões das páginas */
        .nomes-superior {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nome-box {
            border: 2px solid #000;
            padding: 0.5rem 1.5rem;
            min-width: 100px;
            text-align: center;
            color: #60b8e0;
            font-size: 1.1rem;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nome-box.ativo {
            background-color: #e6f4ff;
            border-width: 3px;
        }

        .nome-box:hover {
            background-color: #f0f8ff;
        }

        /* Nome da página atual */
        .nome-selecionado {
            border: 2px solid #000;
            padding: 0.5rem 2rem;
            width: fit-content;
            margin: 0 auto 1.5rem;
            color: #60b8e0;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #fff;
        }

        /* Área principal centralizada */
        .area-principal {
            border: 3px solid #888;
            padding: 1.5rem;
            background-color: #fff;
            max-width: 950px;
            width: 100%;
        }

        /* Grade de itens */
        .grade-imagens {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 1rem;
        }

        .item-imagem {
            border: 2px solid #f8a8c8;
            background-color: #fff;
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 160px;
            gap: 0.8rem;
        }

        /* Área da imagem - APENAS VISUALIZAÇÃO para usuários */
        .imagem-container {
            width: 100%;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 0.3rem;
        }

        .imagem-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .texto-imagem {
            color: #60b8e0;
            font-size: 1rem;
            text-align: center;
        }

        /* Caixa de seleção */
        .caixa-selecao {
            width: 26px;
            height: 26px;
            border: 2px solid #000;
            background-color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            user-select: none;
        }

        .caixa-selecao.selecionado {
            background-color: #90ee90;
            color: #000;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .grade-imagens {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 480px) {
            .grade-imagens {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <h1 class="titulo">PotGLA</h1>

    <!-- Botões para trocar de página -->
    <div class="nomes-superior">
        <div class="nome-box" onclick="carregarPagina('pagina1')" id="btn-pagina1">Página 1</div>
        <div class="nome-box" onclick="carregarPagina('pagina2')" id="btn-pagina2">Página 2</div>
        <div class="nome-box" onclick="carregarPagina('pagina3')" id="btn-pagina3">Página 3</div>
    </div>

    <div class="nome-selecionado" id="nomeAtual">Página 1</div>

    <div class="area-principal">
        <div class="grade-imagens" id="grade"></div>
    </div>

    <script>
        // 📌 DADOS PRINCIPAIS: AQUI VOCÊ EDITA IMAGENS E NOMES
        // Apenas você altera esta parte do código
        const dadosBase = {
            paginaAtual: 'pagina1',
            paginas: {
                pagina1: {
                    nome: 'Página 1',
                    itens: [
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false }
                    ]
                },
                pagina2: {
                    nome: 'Página 2',
                    itens: [
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false }
                    ]
                },
                pagina3: {
                    nome: 'Página 3',
                    itens: [
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false }
                    ]
                }
            }
        };

        // Carrega marcações feitas pelos usuários (não altera as imagens)
        let dados = JSON.parse(localStorage.getItem('dadosPotGLA')) || dadosBase;

        // Garante que as imagens não sejam alteradas pelos usuários
        function sincronizarImagens() {
            for (const idPagina in dados.paginas) {
                dados.paginas[idPagina].itens.forEach((item, i) => {
                    item.imagem = dadosBase.paginas[idPagina].itens[i].imagem;
                });
            }
        }

        const grade = document.getElementById('grade');
        const nomeAtualEl = document.getElementById('nomeAtual');

        // Renderizar a página
        function renderizarPagina() {
            sincronizarImagens();
            const pag = dados.paginas[dados.paginaAtual];
            nomeAtualEl.textContent = pag.nome;

            document.querySelectorAll('.nome-box').forEach(btn => btn.classList.remove('ativo'));
            document.getElementById(`btn-${dados.paginaAtual}`).classList.add('ativo');

            grade.innerHTML = '';
            pag.itens.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'item-imagem';
                div.innerHTML = `
                    <div class="imagem-container">
                        ${item.imagem ? `<img src="${item.imagem}" alt="Imagem">` : `<span class="texto-imagem">Imagem</span>`}
                    </div>
                    <div class="caixa-selecao ${item.marcado ? 'selecionado' : ''}" onclick="alternarMarcacao(${index})">${item.marcado ? '✗' : ''}</div>
                `;
                grade.appendChild(div);
            });
        }

        // Trocar de página
        function carregarPagina(nomePagina) {
            dados.paginaAtual = nomePagina;
            salvarDados();
            renderizarPagina();
        }

        // Marcar/desmarcar (apenas isso que o usuário pode fazer)
        function alternarMarcacao(index) {
            const pag = dados.paginas[dadosGerais?.paginaAtual || dados.paginaAtual];
            pag.itens[index].marcado = !pag.itens[index].marcado;
            salvarDados();
            renderizarPagina();
        }

        // Salva apenas as marcações
        function salvarDados() {
            localStorage.setItem('dadosPotGLA', JSON.stringify(dados));
        }

        // Iniciar
        renderizarPagina();
    </script>

</body>
</html>
