<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotGLA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }

        body {
            padding: 2.5rem 1.5rem;
            background-color: #0f111a;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Título principal */
        .titulo {
            font-size: 2.4rem;
            font-weight: 700;
            color: #a881ff;
            margin-bottom: 2.5rem;
            letter-spacing: 1px;
        }

        /* Botões das páginas */
        .nomes-superior {
            display: flex;
            gap: 1.2rem;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nome-box {
            border: 2px solid #2d2f44;
            padding: 0.6rem 1.8rem;
            min-width: 110px;
            text-align: center;
            color: #d0bfff;
            font-size: 1.15rem;
            font-weight: 500;
            background-color: #1a1c2e;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .nome-box.ativo {
            background-color: #5b21b6;
            border-color: #7c3aed;
            color: #ffffff;
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.4);
        }

        .nome-box:hover {
            background-color: #252840;
            border-color: #4a3b8c;
        }

        /* Nome da página atual */
        .nome-selecionado {
            border: 2px solid #2d2f44;
            padding: 0.7rem 2.5rem;
            width: fit-content;
            margin: 0 auto 2rem;
            color: #c4b5fd;
            font-size: 1.3rem;
            font-weight: 600;
            background-color: #1a1c2e;
            border-radius: 6px;
        }

        /* Área principal */
        .area-principal {
            border: 3px solid #2d2f44;
            padding: 2rem;
            background-color: #161826;
            max-width: 980px;
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* Grade de itens */
        .grade-imagens {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 1.2rem;
        }

        .item-imagem {
            border: 2px solid #333552;
            background-color: #1e2033;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 170px;
            gap: 1rem;
            border-radius: 6px;
            transition: border-color 0.2s;
        }

        .item-imagem:hover {
            border-color: #4a3b8c;
        }

        /* Área da imagem - apenas visualização */
        .imagem-container {
            width: 100%;
            height: 95px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 0.4rem;
            border: 1px dashed #444668;
            border-radius: 4px;
            pointer-events: none;
            background-color: #191b2b;
        }

        .imagem-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .texto-imagem {
            color: #94a3b8;
            font-size: 1rem;
            text-align: center;
        }

        /* Caixa de marcação */
        .caixa-selecao {
            width: 28px;
            height: 28px;
            border: 2px solid #6366f1;
            background-color: #1e2033;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.3rem;
            color: #a5b4fc;
            user-select: none;
            transition: all 0.2s ease;
        }

        .caixa-selecao.selecionado {
            background-color: #22c55e;
            border-color: #16a34a;
            color: #ffffff;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.3);
        }

        .caixa-selecao:hover:not(.selecionado) {
            border-color: #818cf8;
            background-color: #252840;
        }

        /* Responsividade */
        @media (max-width: 850px) {
            .grade-imagens {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 520px) {
            .grade-imagens {
                grid-template-columns: repeat(2, 1fr);
            }

            .titulo {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <h1 class="titulo">PotGLA</h1>

    <!-- Botões para trocar de página -->
    <div class="nomes-superior">
        <div class="nome-box" onclick="carregarPagina('pagina1')" id="btn-pagina1">Página 1</div>
        <div class="nome-box" onclick="carregarPagina('pagina2')" id="btn-pagina2">Página 2</div>
        <div class="nome-box" onclick="carregarPagina('pagina3')" id="btn-pagina3">Página 3</div>
    </div>

    <div class="nome-selecionado" id="nomeAtual">Página 1</div>

    <div class="area-principal">
        <div class="grade-imagens" id="grade"></div>
    </div>

    <script>
        // 📌 DADOS FIXOS: AQUI VOCÊ EDITA NOMES E IMAGENS (só você altera)
        const dadosBase = {
            paginaAtual: 'pagina1',
            paginas: {
                pagina1: {
                    nome: 'Página 1',
                    itens: [
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false }
                    ]
                },
                pagina2: {
                    nome: 'Página 2',
                    itens: [
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false }
                    ]
                },
                pagina3: {
                    nome: 'Página 3',
                    itens: [
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false },
                        { imagem: '', marcado: false }
                    ]
                }
            }
        };

        // Carrega apenas as marcações de cada usuário
        let dados = JSON.parse(localStorage.getItem('dadosPotGLA')) || JSON.parse(JSON.stringify(dadosBase));

        // Garante que imagens e nomes não sejam alterados
        function sincronizarDadosFixos() {
            for (const idPagina in dados.paginas) {
                dados.paginas[idPagina].nome = dadosBase.paginas[idPagina].nome;
                dados.paginas[idPagina].itens.forEach((item, i) => {
                    item.imagem = dadosBase.paginas[idPagina].itens[i].imagem;
                });
            }
        }

        const grade = document.getElementById('grade');
        const nomeAtualEl = document.getElementById('nomeAtual');

        // Monta a tela
        function renderizarPagina() {
            sincronizarDadosFixos();
            const pag = dados.paginas[dados.paginaAtual];
            nomeAtualEl.textContent = pag.nome;

            document.querySelectorAll('.nome-box').forEach(btn => btn.classList.remove('ativo'));
            document.getElementById(`btn-${dados.paginaAtual}`).classList.add('ativo');

            grade.innerHTML = '';
            pag.itens.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'item-imagem';
                div.innerHTML = `
                    <div class="imagem-container">
                        ${item.imagem ? `<img src="${item.imagem}" alt="Imagem">` : `<span class="texto-imagem">Imagem</span>`}
                    </div>
                    <div class="caixa-selecao ${item.marcado ? 'selecionado' : ''}" onclick="alternarMarcacao(${index})">${item.marcado ? '✗' : ''}</div>
                `;
                grade.appendChild(div);
            });
        }

        // Trocar de página
        function carregarPagina(nomePagina) {
            dados.paginaAtual = nomePagina;
            salvarMarcacoes();
            renderizarPagina();
        }

        // Marcar / Desmarcar
        function alternarMarcacao(index) {
            const pag = dados.paginas[dados.paginaAtual];
            pag.itens[index].marcado = !pag.itens[index].marcado;
            salvarMarcacoes();
            renderizarPagina();
        }

        // Salva apenas as marcações
        function salvarMarcacoes() {
            localStorage.setItem('dadosPotGLA', JSON.stringify(dados));
        }

        // Inicia a aplicação
        renderizarPagina();
    </script>

</body>
</html>
