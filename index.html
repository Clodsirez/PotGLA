<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotGLA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* Fundo geral escuro */
        body {
            padding: 2rem;
            background-color: #0f111a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Título PotGLA */
        .titulo {
            font-size: 2rem;
            font-weight: bold;
            color: #a881ff;
            margin-bottom: 2rem;
        }

        /* Botões das páginas */
        .botoes-paginas {
            display: flex;
            gap: 12px;
            margin-bottom: 1.2rem;
        }

        .botao-pagina {
            border: 2px solid #ffffff;
            background-color: #1a1c2e;
            color: #93c5fd;
            padding: 8px 24px;
            min-width: 110px;
            text-align: center;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .botao-pagina.ativo {
            background-color: #5b21b6;
            border-color: #7c3aed;
            color: #ffffff;
        }

        .botao-pagina:hover {
            background-color: #252840;
        }

        /* Nome da página atual */
        .pagina-atual {
            border: 2px solid #ffffff;
            background-color: #1a1c2e;
            color: #93c5fd;
            padding: 8px 32px;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Área principal */
        .area-principal {
            border: 3px solid #888888;
            background-color: #161826;
            padding: 1.5rem;
            max-width: 1100px;
            width: 100%;
        }

        /* Grade de itens */
        .grade {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 1rem;
        }

        .item {
            border: 2px solid #f8a8c8;
            background-color: #1e2033;
            padding: 2rem 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 140px;
        }

        .texto-imagem {
            color: #93c5fd;
            font-size: 1.1rem;
        }

        /* Caixa de marcação */
        .caixa {
            width: 26px;
            height: 26px;
            border: 2px solid #ffffff;
            background-color: #1e2033;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffffff;
            margin-top: 1rem;
        }

        .caixa.marcado {
            background-color: #22c55e;
            border-color: #16a34a;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <h1 class="titulo">PotGLA</h1>

    <div class="botoes-paginas">
        <div class="botao-pagina ativo" onclick="mudarPagina(1)">Página 1</div>
        <div class="botao-pagina" onclick="mudarPagina(2)">Página 2</div>
        <div class="botao-pagina" onclick="mudarPagina(3)">Página 3</div>
    </div>

    <div class="pagina-atual" id="nomePagina">Página 1</div>

    <div class="area-principal">
        <div class="grade" id="grade"></div>
    </div>

    <script>
        // Dados salvos: cada página tem suas próprias marcações
        let dados = JSON.parse(localStorage.getItem('dadosPotGLA')) || {
            paginaAtual: 1,
            paginas: [
                { nome: "Página 1", marcacoes: Array(12).fill(false) },
                { nome: "Página 2", marcacoes: Array(12).fill(false) },
                { nome: "Página 3", marcacoes: Array(12).fill(false) }
            ]
        };

        // Renderizar a página atual
        function renderizar() {
            const pagina = dados.paginas[dados.paginaAtual - 1];
            document.getElementById('nomePagina').textContent = pagina.nome;

            // Destacar o botão da página ativa
            document.querySelectorAll('.botao-pagina').forEach((botao, indice) => {
                botao.classList.toggle('ativo', indice + 1 === dados.paginaAtual);
            });

            // Montar a grade de 12 itens
            const grade = document.getElementById('grade');
            grade.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <span class="texto-imagem">Imagem</span>
                    <div class="caixa ${pagina.marcacoes[i] ? 'marcado' : ''}" onclick="alternarMarcacao(${i})">${pagina.marcacoes[i] ? '✗' : ''}</div>
                `;
                grade.appendChild(div);
            }
        }

        // Trocar de página
        function mudarPagina(numero) {
            dados.paginaAtual = numero;
            salvarDados();
            renderizar();
        }

        // Marcar ou desmarcar item
        function alternarMarcacao(indice) {
            const pagina = dados.paginas[dados.paginaAtual - 1];
            pagina.marcacoes[indice] = !pagina.marcacoes[indice];
            salvarDados();
            renderizar();
        }

        // Salvar para não perder ao fechar a página
        function salvarDados() {
            localStorage.setItem('dadosPotGLA', JSON.stringify(dados));
        }

        // Iniciar a aplicação
        renderizar();
    </script>

</body>
</html>
